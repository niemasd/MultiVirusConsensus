name: Attach MultiVirusConsensus.py to release
on:
  release:
    types: [published]
jobs:
  attach_py:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v2
      - name: Upload MultiVirusConsensus.py to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: MultiVirusConsensus.py
          asset_name: MultiVirusConsensus.py
          tag: ${{ github.ref }}
          overwrite: true
