<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MultiVirusConsensus Visualizer</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#0f1622;
      --text:#e6edf3;
      --muted:#9fb0c0;
      --border:#1f2a3a;
      --tooltip:#0b1220;
      --axis:#e6edf3;
      --axisLine: rgba(255,255,255,0.22);
      --line: rgba(230,237,243,0.9);
      --plotBorder: rgba(255,255,255,0.08);
    }
    body.light{
      --bg:#f7f8fb;
      --panel:#ffffff;
      --text:#0b1220;
      --muted:#526070;
      --border:#d7dbe3;
      --tooltip:#ffffff;
      --axis:#0b1220;
      --axisLine: rgba(0,0,0,0.22);
      --line: rgba(11,18,32,0.88);
      --plotBorder: rgba(0,0,0,0.10);
    }

    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:var(--bg);
      color:var(--text);
    }
    header{
      position:sticky; top:0; z-index:10;
      background:linear-gradient(to bottom, color-mix(in srgb, var(--bg) 98%, transparent), color-mix(in srgb, var(--bg) 88%, transparent));
      backdrop-filter: blur(8px);
      border-bottom:1px solid var(--border);
    }
    .wrap{max-width:1400px; margin:0 auto; padding:16px 16px;}
    h1{font-size:18px; margin:0 0 8px 0;}
    .row{display:flex; gap:12px; align-items:center; flex-wrap:wrap}
    .hint{color:var(--muted); font-size:13px; line-height:1.3; flex: 1 1 520px}
    input[type="file"]{
      background:var(--panel);
      color:var(--text);
      border:1px solid var(--border);
      padding:10px;
      border-radius:10px;
    }
    button{
      background:var(--panel);
      color:var(--text);
      border:1px solid var(--border);
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      white-space:nowrap;
    }
    button:hover{border-color: color-mix(in srgb, var(--border) 40%, var(--text));}
    button:disabled{opacity:0.55; cursor:not-allowed}
    .status{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
      white-space:pre-wrap;
    }
    main{max-width:1400px; margin:0 auto; padding:16px;}
    .folder-title{
      margin: 4px 0 14px 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .plot{
      width:100%;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px 12px 10px 12px;
      margin:0 0 14px 0;
      box-sizing:border-box;
    }
    .plot-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }
    .plot-left{
      min-width: 240px;
    }
    .plot-title{font-size:16px; font-weight:650; letter-spacing:0.2px;}
    .plot-meta{color:var(--muted); font-size:12px;}
    .plot-actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .svg-wrap{
      position:relative;
      width:100%;
      height:280px;
    }
    svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }
    .tooltip{
      position:absolute;
      pointer-events:none;
      background:color-mix(in srgb, var(--tooltip) 96%, transparent);
      color:var(--text);
      border:1px solid color-mix(in srgb, var(--border) 60%, transparent);
      border-radius:10px;
      padding:8px 10px;
      font-size:12px;
      line-height:1.35;
      box-shadow:0 8px 24px rgba(0,0,0,0.20);
      white-space:nowrap;
      transform: translate(12px, 12px);
      display:none;
    }
    .k{color:var(--muted)}
    .warn{color:#ffcc66; font-size:12px; margin-top:6px; display:none;}
    code{color: color-mix(in srgb, var(--text) 88%, var(--muted));}
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>MultiVirusConsensus Visualizer</h1>
    <div class="row">
      <input id="folder" type="file" webkitdirectory multiple />
      <button id="reload" disabled>Reload</button>
      <button id="toggleTheme">Light mode</button>
      <button id="downloadAll" disabled>Download All (ZIP)</button>
    </div>
    <div id="folderHeader" class="folder-title"></div>
    <div id="status" class="status"></div>
  </div>
</header>
<main id="plots"></main>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
(() => {
  // set things up
  const elFolder = document.getElementById("folder");
  const elPlots = document.getElementById("plots");
  const elFolderHeader = document.getElementById("folderHeader");
  const elStatus = document.getElementById("status");
  const elReload = document.getElementById("reload");
  const elDownloadAll = document.getElementById("downloadAll");
  const elToggleTheme = document.getElementById("toggleTheme");
  let lastFileList = null;
  let models = [];

  // toggle light/dark mode
  function applyTheme(mode){
    document.body.classList.toggle("light", mode === "light");
    elToggleTheme.textContent = (mode === "light") ? "Dark mode" : "Light mode";
    localStorage.setItem("pcv_theme", mode);
    rerenderAll();
  }
  const savedTheme = localStorage.getItem("pcv_theme") || "dark";
  applyTheme(savedTheme);
  elToggleTheme.addEventListener("click", () => {
    const now = document.body.classList.contains("light") ? "light" : "dark";
    applyTheme(now === "light" ? "dark" : "light");
  });

  // update status text
  function logStatus(msg){
    elStatus.textContent = msg;
  }

  // helper function to get the basename of a path
  function basename(path){
    const p = (path || "").split("/"); return p[p.length-1];
  }

  // get the genome ID X from a filename reference.X.fas, X.poscounts.tsv, or X.consensus.fas
  function genomeIdFromFilename(fname){
    if (fname.startsWith("reference.") && fname.endsWith(".fas")) return fname.slice("reference.".length, -".fas".length);
    if (fname.endsWith(".poscounts.tsv")) return fname.slice(0, -".poscounts.tsv".length);
    if (fname.endsWith(".consensus.fas")) return fname.slice(0, -".consensus.fas".length);
    return null;
  }

  // parse a FASTA file
  function parseFasta(text){
    const lines = text.replace(/\r/g,"").split("\n").filter(l => l.length > 0);
    let header = "";
    let seq = "";
    for (const line of lines){
      if (line.startsWith(">")){
        if (!header) header = line.slice(1).trim();
        continue;
      }
      seq += line.trim();
    }
    return { header, seq };
  }

  // calculate the proportion of a sequence that isn't N (ambiguous)
  function nonNFraction(seq){
    const s = (seq || "").toUpperCase();
    const len = s.length;
    if (!len) return { frac: 0, nonN: 0, len: 0 };
    let nonN = 0;
    for (let i=0;i<len;i++) if (s[i] !== "N") nonN++;
    return { frac: nonN / len, nonN, len };
  }

  // parse a ViralConsensus position counts file (*.poscounts.tsv)
  function parseTSVPoscounts(text){
    // set things up and parse header
    const lines = text.replace(/\r/g,"").split("\n").filter(l => l.length > 0);
    if (lines.length < 2) return [];
    const header = lines[0].split("\t");
    const idx = {};
    header.forEach((h,i)=> idx[h]=i);

    // parse contents of TSV and return position counts
    const out = [];
    for (let i=1;i<lines.length;i++){
      const cols = lines[i].split("\t");
      const pos = Number(cols[idx["Pos"]]);
      if (!Number.isFinite(pos)) continue;
      const A = Number(cols[idx["A"]]) || 0;
      const C = Number(cols[idx["C"]]) || 0;
      const G = Number(cols[idx["G"]]) || 0;
      const T = Number(cols[idx["T"]]) || 0;
      const D = Number(cols[idx["-"]]) || 0;
      const Total = Number(cols[idx["Total"]]);
      out.push({
        Pos: pos,
        A, C, G, T, "-": D,
        Total: Number.isFinite(Total) ? Total : (A+C+G+T+D)
      });
    }
    return out;
  }

  // build dense rows from parsed TSV contents
  function buildDenseRows(refLen, tsvRows){
    const dense = Array.from({length: refLen}, (_,i)=>({Pos:i,A:0,C:0,G:0,T:0,"-":0,Total:0}));
    for (const r of tsvRows){
      const p = r.Pos;
      if (p >= 0 && p < refLen){
        dense[p] = r;
      }
    }
    return dense;
  }

  // clear plots
  function clearPlots(){
    elPlots.innerHTML = "";
    models = [];
  }

  // get a CSD variable property value
  function cssVar(name){
    return getComputedStyle(document.body).getPropertyValue(name).trim();
  }

  // style a plot axis
  function styleAxis(sel){
    sel.selectAll("path, line").attr("stroke", cssVar("--axisLine"));
    sel.selectAll("text").attr("fill", cssVar("--axis")).attr("font-size", 11);
  }

  // Measure max y tick label width (in px) to position the Y axis label so it never overlaps.
  function measureMaxTickWidth(labels, font = "11px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"){
    const c = document.createElement("canvas");
    const ctx = c.getContext("2d");
    ctx.font = font;
    let max = 0;
    for (const s of labels){
      const w = ctx.measureText(String(s)).width;
      if (w > max) max = w;
    }
    return max;
  }

  // variable to store the selected folder's name
  let selectedFolderName = null;

  // get the folder name from a list of files
  function folderNameFromFiles(fileList){
    const first = (fileList && fileList.length) ? fileList[0] : null;
    const rel = first?.webkitRelativePath || "";
    return rel ? rel.split("/")[0] : null;
  }

  // make a plot
  function makePlot({X, refLen, fracInfo, dense}){
    const plot = document.createElement("div");
    plot.className = "plot";
    const header = document.createElement("div");
    header.className = "plot-header";
    const left = document.createElement("div");
    left.className = "plot-left";
    const title = document.createElement("div");
    title.className = "plot-title";
    title.textContent = X;
    const meta = document.createElement("div");
    meta.className = "plot-meta";
    meta.textContent = `Consensus non-N: ${fracInfo.nonN}/${fracInfo.len} (${(fracInfo.frac*100).toFixed(2)}%) • Reference length: ${refLen}`;
    left.appendChild(title);
    left.appendChild(meta);
    const actions = document.createElement("div");
    actions.className = "plot-actions";
    const dlBtn = document.createElement("button");
    dlBtn.textContent = "Download";
    actions.appendChild(dlBtn);
    header.appendChild(left);
    header.appendChild(actions);
    const wrap = document.createElement("div");
    wrap.className = "svg-wrap";
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    const tooltip = document.createElement("div");
    tooltip.className = "tooltip";
    wrap.appendChild(svg);
    wrap.appendChild(tooltip);
    const warn = document.createElement("div");
    warn.className = "warn";
    warn.textContent = "Large genome: interactive hover may feel slower in some browsers.";
    if (refLen > 50000) warn.style.display = "block";
    plot.appendChild(header);
    plot.appendChild(wrap);
    plot.appendChild(warn);
    elPlots.appendChild(plot);
    const model = { X, refLen, fracInfo, dense, svg, wrap, tooltip };
    models.push(model);
    dlBtn.addEventListener("click", () => downloadSVG(model, `${model.X}.svg`));
    render(model);
    return model;
  }

  // render a given plot
  function render(model){
    const { svg, wrap, tooltip, dense, refLen } = model;
    const W = wrap.clientWidth;
    const H = wrap.clientHeight;

    // Base margins; we'll adjust left label position dynamically
    const margin = { top: 14, right: 18, bottom: 40, left: 56 };
    const innerW = Math.max(1, W - margin.left - margin.right);
    const innerH = Math.max(1, H - margin.top - margin.bottom);

    // clear and set up SVG
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg.setAttribute("preserveAspectRatio", "none");

    // set up D3 plot in SVG
    const g = d3.select(svg).append("g");
    const x = d3.scaleLinear()
      .domain([0, Math.max(0, refLen - 1)])
      .range([0, innerW]);
    const yMax = Math.max(1, d3.max(dense, d => d.Total) || 1);
    const y = d3.scaleLinear()
      .domain([0, yMax])
      .nice()
      .range([innerH, 0]);

    // Tick formatting
    const xTickFmt = d3.format(",d"); // commas
    const yTickFmt = d3.format(",");  // commas (nice for big counts)
    const xAxis = d3.axisBottom(x)
      .ticks(Math.min(10, Math.max(2, Math.floor(innerW / 120))))
      .tickFormat(xTickFmt);
    const yAxis = d3.axisLeft(y)
      .ticks(Math.min(8, Math.max(2, Math.floor(innerH / 50))))
      .tickFormat(yTickFmt);

    // Compute y label x-position to avoid overlap with long tick labels
    const yTickLabels = y.ticks(yAxis.ticks()[0] || 6).map(yTickFmt);
    const maxYTickW = measureMaxTickWidth(yTickLabels);
    // y-axis tick labels extend left of margin.left; place y-label further left than that by padding.
    const yLabelX = Math.max(10, margin.left - maxYTickW - 28);

    // Axes
    g.append("g")
      .attr("transform", `translate(${margin.left},${margin.top + innerH})`)
      .call(xAxis)
      .call(styleAxis);
    g.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`)
      .call(yAxis)
      .call(styleAxis);

    // Labels
    g.append("text")
      .attr("x", margin.left + innerW / 2)
      .attr("y", margin.top + innerH + 34)
      .attr("text-anchor", "middle")
      .attr("fill", cssVar("--axis"))
      .attr("font-size", 12)
      .text("Reference Position");
    g.append("text")
      .attr("transform", `translate(${yLabelX},${margin.top + innerH/2}) rotate(-90)`)
      .attr("text-anchor", "middle")
      .attr("fill", cssVar("--axis"))
      .attr("font-size", 12)
      .text("Count");

    // Clip path so line doesn't bleed into margins
    const clipId = `clip_${String(model.X).replace(/[^a-zA-Z0-9_]/g, "_")}`;
    g.append("defs")
      .append("clipPath")
      .attr("id", clipId)
      .append("rect")
      .attr("x", margin.left)
      .attr("y", margin.top)
      .attr("width", innerW)
      .attr("height", innerH);
    const line = d3.line()
      .x(d => margin.left + x(d.Pos))
      .y(d => margin.top + y(d.Total))
      .curve(d3.curveLinear);
    g.append("path")
      .datum(dense)
      .attr("clip-path", `url(#${clipId})`)
      .attr("fill", "none")
      .attr("stroke", cssVar("--line"))
      .attr("stroke-width", 1.25)
      .attr("d", line);

    // Border around plot area
    g.append("rect")
      .attr("x", margin.left)
      .attr("y", margin.top)
      .attr("width", innerW)
      .attr("height", innerH)
      .attr("fill", "none")
      .attr("stroke", cssVar("--plotBorder"));

    // Hover elements
    const hoverG = g.append("g")
      .attr("data-role", "hover-layer")   // <-- add this
      .style("display","none");
    const vline = hoverG.append("line")
      .attr("y1", margin.top)
      .attr("y2", margin.top + innerH)
      .attr("stroke", cssVar("--axisLine"))
      .attr("stroke-width", 1);
    const dot = hoverG.append("circle")
      .attr("r", 3.25)
      .attr("fill", cssVar("--axis"))
      .attr("stroke", "rgba(0,0,0,0.25)")
      .attr("stroke-width", 1);
    const overlay = g.append("rect")
      .attr("x", margin.left)
      .attr("y", margin.top)
      .attr("width", innerW)
      .attr("height", innerH)
      .attr("fill", "transparent")
      .style("cursor","crosshair")
      .attr("data-role", "overlay"); // used when exporting
    overlay
      .on("mouseenter", () => { hoverG.style("display", null); tooltip.style.display = "block"; })
      .on("mouseleave", () => { hoverG.style("display", "none"); tooltip.style.display = "none"; })
      .on("mousemove", (event) => {
        const [mx] = d3.pointer(event, svg);
        const px = Math.min(margin.left + innerW, Math.max(margin.left, mx));
        const pos = Math.round(x.invert(px - margin.left));
        const p = Math.min(refLen - 1, Math.max(0, pos));
        const d = dense[p] || {Pos:p,A:0,C:0,G:0,T:0,"-":0,Total:0};
        const cx = margin.left + x(d.Pos);
        const cy = margin.top + y(d.Total);
        vline.attr("x1", cx).attr("x2", cx);
        dot.attr("cx", cx).attr("cy", cy);
        tooltip.innerHTML =
          `<div><span class="k">Pos</span>: ${d3.format(",d")(d.Pos)}</div>` +
          `<div><span class="k">A</span>: ${yTickFmt(d.A)} &nbsp; <span class="k">C</span>: ${yTickFmt(d.C)} &nbsp; <span class="k">G</span>: ${yTickFmt(d.G)}</div>` +
          `<div><span class="k">T</span>: ${yTickFmt(d.T)} &nbsp; <span class="k">-</span>: ${yTickFmt(d["-"])} &nbsp; <span class="k">Total</span>: ${yTickFmt(d.Total)}</div>`;
        const wrapRect = wrap.getBoundingClientRect();
        const tipRect = tooltip.getBoundingClientRect();
        let left = (event.clientX - wrapRect.left) + 12;
        let top  = (event.clientY - wrapRect.top) + 12;
        const maxLeft = wrap.clientWidth - tipRect.width - 8;
        const maxTop  = wrap.clientHeight - tipRect.height - 8;
        left = Math.max(8, Math.min(maxLeft, left));
        top  = Math.max(8, Math.min(maxTop, top));
        tooltip.style.left = left + "px";
        tooltip.style.top = top + "px";
      });
  }

  // re-render all plots
  function rerenderAll(){
    if (!models.length) return;
      for (const m of models) render(m);
  }

  // get exportable SVG from plot
  function cloneExportableSVG(model){
    // set things up
    const original = model.svg;
    const clone = original.cloneNode(true);

    // Remove hover overlay rectangle
    const overlays = clone.querySelectorAll('[data-role="overlay"]');
    overlays.forEach(n => n.remove());

    // Remove hover crosshair + dot layer
    const hoverLayers = clone.querySelectorAll('[data-role="hover-layer"]');
    hoverLayers.forEach(n => n.remove());

    // Add background rect (so exported SVG has same panel background)
    const vb = original.getAttribute("viewBox");
    let W = 0, H = 0;
    if (vb){
      const parts = vb.split(/\s+/).map(Number);
      W = parts[2] || 0;
      H = parts[3] || 0;
    }
    const bg = document.createElementNS("http://www.w3.org/2000/svg","rect");
    bg.setAttribute("x","0");
    bg.setAttribute("y","0");
    bg.setAttribute("width", String(W));
    bg.setAttribute("height", String(H));
    bg.setAttribute("fill", getComputedStyle(document.body).getPropertyValue("--panel").trim());
    clone.insertBefore(bg, clone.firstChild);

    // Ensure proper standalone SVG namespaces
    clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
    clone.setAttribute("xmlns:xlink","http://www.w3.org/1999/xlink");

    // Make exported SVG keep correct aspect ratio (avoid "squished" look)
    clone.setAttribute("preserveAspectRatio", "xMidYMid meet");
    if (W > 0 && H > 0) {
      clone.setAttribute("width", String(W));
      clone.setAttribute("height", String(H));
    }
    return clone;
  }

  // convert SVG to downloadable blob
  function svgToBlob(svgNode){
    const serializer = new XMLSerializer();
    const svgText = serializer.serializeToString(svgNode);
    return new Blob([svgText], {type: "image/svg+xml;charset=utf-8"});
  }

  // download the converted SVG as a blob
  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  // download an SVG
  function downloadSVG(model, filename){
    const exportSVG = cloneExportableSVG(model);
    const blob = svgToBlob(exportSVG);
    downloadBlob(blob, filename);
  }

  // download all plots
  async function downloadAllZIP(){
    if (!models.length) return;
    const zip = new JSZip();
    for (const m of models){
      const exportSVG = cloneExportableSVG(m);
      const blob = svgToBlob(exportSVG);
      const arrBuf = await blob.arrayBuffer();
      zip.file(`${m.X}.svg`, arrBuf);
    }
    const zipBlob = await zip.generateAsync({type:"blob"});
    downloadBlob(zipBlob, "plots_svgs.zip");
  }

  // build the plots from a list of files
  async function buildFromFiles(fileList){
    // set things up
    clearPlots();
    logStatus("Reading folder…");
    elDownloadAll.disabled = true;

    // parse filenames
    const filesByName = new Map();
    for (const f of fileList){
      filesByName.set(basename(f.webkitRelativePath || f.name), f);
    }

    // parse genome IDs from filenames
    const genomeIDs = new Set();
    for (const name of filesByName.keys()){
      const X = genomeIdFromFilename(name);
      if (X) genomeIDs.add(X);
    }
    if (genomeIDs.size === 0){
      logStatus("No matching files found. Expected files like X.poscounts.tsv, X.consensus.fas, reference.X.fas");
      return;
    }

    // load genome data
    const genomes = [];
    const missing = [];
    for (const X of genomeIDs){
      const refName = `reference.${X}.fas`;
      const conName = `${X}.consensus.fas`;
      const tsvName = `${X}.poscounts.tsv`;
      const refFile = filesByName.get(refName);
      const conFile = filesByName.get(conName);
      const tsvFile = filesByName.get(tsvName);
      if (!refFile || !conFile || !tsvFile){
        missing.push({X, ref:!!refFile, consensus:!!conFile, poscounts:!!tsvFile});
        continue;
      }
      const [refText, conText, tsvText] = await Promise.all([refFile.text(), conFile.text(), tsvFile.text()]);
      const ref = parseFasta(refText);
      const con = parseFasta(conText);
      const refLen = ref.seq.length;
      const fracInfo = nonNFraction(con.seq);
      const tsvRows = parseTSVPoscounts(tsvText);
      const dense = buildDenseRows(refLen, tsvRows);
      genomes.push({X, refLen, fracInfo, dense});
    }
    genomes.sort((a,b) => (b.fracInfo.frac - a.fracInfo.frac) || (b.fracInfo.nonN - a.fracInfo.nonN) || (a.X.localeCompare(b.X)));

    // update status with info about loaded genomes
    const lines = [];
    lines.push(`Found genome IDs: ${genomeIDs.size}`);
    lines.push(`Plottable genomes: ${genomes.length}`);
    if (missing.length){
      lines.push(`Skipped (missing at least one required file):`);
      for (const m of missing){
        lines.push(`  - ${m.X} (reference: ${m.ref}, consensus: ${m.consensus}, poscounts: ${m.poscounts})`);
      }
    }
    logStatus(lines.join("\n"));

    // make the plots
    for (const g of genomes) makePlot(g);
    elReload.disabled = false;
    elDownloadAll.disabled = (models.length === 0);
  }

  // event listener for changing the folder element
  elFolder.addEventListener("change", async (e) => {
    const files = Array.from(e.target.files || []);
    lastFileList = files;
    selectedFolderName = folderNameFromFiles(files) || null;
    elFolderHeader.textContent = selectedFolderName;
    elReload.disabled = true;
    await buildFromFiles(files);
  });

  // event listener for clicking on the reload button
  elReload.addEventListener("click", async () => {
    if (!lastFileList) return;
    elReload.disabled = true;
    await buildFromFiles(lastFileList);
    elReload.disabled = false;
  });

  // event listener for clicking on the Download All button
  elDownloadAll.addEventListener("click", async () => {
    await downloadAllZIP();
  });

  // responsive redraw
  let resizeTimer = null;
  window.addEventListener("resize", () => {
    if (!models.length) return;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      rerenderAll();
    }, 120);
  });
  logStatus("Choose a folder to begin.");
})();
</script>
